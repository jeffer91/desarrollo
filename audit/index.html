<!-- =========================================================
Nombre completo: index.html
Ruta o ubicación: /audit/index.html
Función o funciones:
- Servir como punto de entrada estable del módulo Audit.
- Redirigir hacia el menú superior independiente de Audit.
- Conservar parámetros y navegación por hash.
- Mostrar una alternativa manual si la redirección no puede ejecutarse.
========================================================= -->
<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Audit · Iniciando</title>
  <meta name="description" content="Punto de entrada del módulo Audit." />
  <link rel="icon" href="data:," />
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f7fb;
      color: #172033;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .boot-card {
      width: min(520px, 100%);
      padding: 32px;
      border: 1px solid #dbe3ef;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 18px 50px rgba(30, 55, 90, 0.12);
      text-align: center;
    }

    .boot-mark {
      width: 58px;
      height: 58px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: #163b66;
      color: #ffffff;
      font-size: 24px;
      font-weight: 800;
    }

    h1 { margin: 0 0 10px; font-size: 28px; }
    p { margin: 0 0 20px; color: #5b687b; line-height: 1.6; }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 12px;
      background: #163b66;
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="boot-card">
    <div class="boot-mark" aria-hidden="true">A</div>
    <h1>Abriendo Audit</h1>
    <p>Preparando el menú superior independiente.</p>
    <a id="auditManualLink" href="./menu/menu.index.html">Abrir menú de Audit</a>
  </main>

  <script>
    (function openAuditMenu() {
      "use strict";

      var target = "./menu/menu.index.html" +
        (window.location.search || "") +
        (window.location.hash || "");

      var manualLink = document.getElementById("auditManualLink");
      if (manualLink) manualLink.href = target;

      try {
        window.location.replace(target);
      } catch (error) {
        console.error("No fue posible abrir el menú de Audit.", error);
      }
    })();
  </script>
</body>
</html>
