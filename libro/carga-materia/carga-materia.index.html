<!-- =========================================================
Nombre completo: carga-materia.index.html
Ruta o ubicación: /desarrollo/libro/carga-materia/carga-materia.index.html
Función o funciones:
1. Mostrar la pantalla Carga de la materia.
2. Recibir carrera y materia digitadas manualmente.
3. Recibir información base, contenidos y actividades por archivo o texto pegado.
4. Mantener ocultos los elementos técnicos de revisión, validación y vista previa.
5. Preparar la carga flexible para Excel, PDF o texto.
========================================================= -->
<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Libro · Carga de la materia</title>
  <meta name="description" content="Carga de la materia del módulo Libro." />
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./carga-materia.css" />
</head>
<body>
  <main class="libro-page libro-page--simple">
    <header class="libro-simple-topbar">
      <nav class="libro-simple-menu" aria-label="Menú superior del módulo Libro">
        <a class="is-active" href="./carga-materia.index.html">Carga de la materia</a>
        <a href="../../index.html">Panel principal</a>
      </nav>
    </header>

    <section class="libro-simple-title">
      <h1>Carga de la materia</h1>
    </section>

    <section class="libro-card libro-card--wide libro-simple-card">
      <div class="libro-card__head">
        <div>
          <h2>Carrera y materia</h2>
        </div>
        <span id="manual-status" class="libro-status-pill is-pending libro-hidden-technical">Pendiente</span>
      </div>

      <div class="libro-form-grid">
        <label class="libro-field">
          <span>Carrera</span>
          <input id="carrera-input" type="text" autocomplete="off" placeholder="Ej. Tecnología Superior en Mecánica Automotriz" />
        </label>

        <label class="libro-field">
          <span>Materia</span>
          <input id="materia-input" type="text" autocomplete="off" placeholder="Ej. Electricidad Automotriz" />
        </label>
      </div>
    </section>

    <section class="libro-grid libro-grid--main libro-grid--simple">
      <article class="libro-card libro-upload-card" data-file-card="base">
        <div class="libro-card__head">
          <div>
            <h2>Información base</h2>
          </div>
          <span id="base-status" class="libro-status-pill is-pending libro-hidden-technical">Pendiente</span>
        </div>

        <label class="libro-file-zone">
          <input id="base-file-input" type="file" accept=".xlsx,.xls,.pdf,.txt" />
          <strong>Seleccionar archivo</strong>
          <span id="base-file-name">Excel, PDF o TXT.</span>
        </label>

        <label class="libro-text-zone">
          <span>O pegar texto</span>
          <textarea id="base-text-input" rows="7" placeholder="Pega aquí descripción, objetivo, unidades, competencias, resultados, bibliografía y justificación."></textarea>
        </label>
      </article>

      <article class="libro-card libro-upload-card" data-file-card="contenidos">
        <div class="libro-card__head">
          <div>
            <h2>Contenido de unidades</h2>
          </div>
          <span id="contenidos-status" class="libro-status-pill is-pending libro-hidden-technical">Pendiente</span>
        </div>

        <label class="libro-file-zone">
          <input id="contenidos-file-input" type="file" accept=".xlsx,.xls,.pdf,.txt" />
          <strong>Seleccionar archivo</strong>
          <span id="contenidos-file-name">Excel, PDF o TXT.</span>
        </label>

        <label class="libro-text-zone">
          <span>O pegar texto</span>
          <textarea id="contenidos-text-input" rows="7" placeholder="Pega aquí los temas y subtemas. Ejemplo: 1.1 Tema principal, 1.1.1 Subtema."></textarea>
        </label>
      </article>

      <article class="libro-card libro-upload-card" data-file-card="actividades">
        <div class="libro-card__head">
          <div>
            <h2>Actividades</h2>
          </div>
          <span id="actividades-status" class="libro-status-pill is-pending libro-hidden-technical">Pendiente</span>
        </div>

        <label class="libro-file-zone">
          <input id="actividades-file-input" type="file" accept=".xlsx,.xls,.pdf,.txt" />
          <strong>Seleccionar archivo</strong>
          <span id="actividades-file-name">Excel, PDF o TXT.</span>
        </label>

        <label class="libro-text-zone">
          <span>O pegar texto</span>
          <textarea id="actividades-text-input" rows="7" placeholder="Pega aquí las actividades. Puedes incluir unidad, tema, semana o tipo de actividad."></textarea>
        </label>
      </article>
    </section>

    <section class="libro-simple-actions" aria-label="Acciones de carga de la materia">
      <button id="analizar-btn" class="libro-btn" type="button" disabled>Procesar materia</button>
      <button id="guardar-btn" class="libro-btn libro-btn--ghost" type="button" disabled>Guardar</button>
      <button id="limpiar-btn" class="libro-btn libro-btn--ghost" type="button">Limpiar</button>
      <span id="expediente-status" class="libro-status-pill is-pending">Sin procesar</span>
    </section>

    <section class="libro-hidden-technical" aria-hidden="true">
      <ul id="checklist" class="libro-checklist"></ul>
      <pre id="preview-box">Completa carrera, materia y selecciona archivo o pega texto.</pre>
    </section>
  </main>

  <script src="./carga-materia.constants.js"></script>
  <script src="./carga-materia.normalizer.js"></script>
  <script src="./carga-materia.xlsx-loader.js"></script>
  <script src="./carga-materia.pdf-reader.js"></script>
  <script src="./carga-materia.excel-reader.js"></script>
  <script src="./carga-materia.mapper-base.js"></script>
  <script src="./carga-materia.mapper-contenidos.js"></script>
  <script src="./carga-materia.mapper-actividades.js"></script>
  <script src="./carga-materia.matcher.js"></script>
  <script src="./carga-materia.builder.js"></script>
  <script src="./carga-materia.validator.js"></script>
  <script src="./carga-materia.preview.js"></script>
  <script src="./carga-materia.storage.js"></script>
  <script src="./carga-materia.main.js"></script>
</body>
</html>
