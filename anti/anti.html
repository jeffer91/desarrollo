<!-- Archivo: anti.html
Ubicación: anti/anti.html
Función: UI Anti + carga de librerías necesarias para ZIP (JSZip) + FileSaver (saveAs) +
Overlay de carga + Excel local -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anti - Informe de originalidad</title>
  <link rel="stylesheet" href="anti.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

  <!-- jsPDF -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <!-- ZIP + saveAs -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
</head>
<body>
  <!-- Overlay de carga (ZIP/descargas masivas) -->
  <div id="anti-loading" class="anti-loading" aria-hidden="true">
    <div class="anti-loading-card" role="status" aria-live="polite">
      <div class="anti-loading-spinner"></div>
      <div class="anti-loading-title" id="anti-loading-title">Procesando...</div>
      <div class="anti-loading-sub" id="anti-loading-sub">Por favor espera.</div>
      <div class="anti-loading-progress">
        <div class="anti-loading-bar">
          <div id="anti-loading-barfill" class="anti-loading-barfill" style="width:0%"></div>
        </div>
        <div class="anti-loading-meta">
          <span id="anti-loading-step">0/0</span>
          <span id="anti-loading-pct">0%</span>
        </div>
      </div>
    </div>
  </div>

  <div class="anti-app">
    <header class="anti-header">
      <div class="anti-title">
        <h1>Anti</h1>
        <p>Estudiantes habilitados (cumple todo excepto Titulación). Genera memorando + informe de originalidad.</p>
      </div>
      <div class="anti-actions-top">
        <button id="btn-download-selected" class="anti-btn anti-btn-primary">
          <i class="fas fa-file-download"></i> Descargar seleccionados
        </button>
        <button id="btn-download-all" class="anti-btn anti-btn-secondary">
          <i class="fas fa-download"></i> Descargar todos (ZIP)
        </button>
      </div>
    </header>

    <section class="anti-card">
      <div id="anti-filters" class="anti-filters"></div>
    </section>

    <section class="anti-card">
      <div class="anti-block-title">
        <h3><i class="fas fa-users"></i> Estudiantes habilitados</h3>
        <div id="anti-summary" class="anti-summary">Selecciona un período para cargar estudiantes.</div>
      </div>
      <div id="anti-table" class="anti-table-wrap"></div>
    </section>
  </div>

  <!-- Capa local del módulo Excel -->
  <script src="../Gestion/Excel/excel-local/excel-local.config.js"></script>
  <script src="../Gestion/Excel/excel-local/excel-local.storage.js"></script>
  <script src="../Gestion/Excel/excel-local/excel-local.bridge.js"></script>
  <script src="../Gestion/Excel/excel-local.repo.js"></script>

  <script>
    (function () {
      "use strict";
      try {
        if (window.ExcelLocalBridge && typeof window.ExcelLocalBridge.ensureReady === "function") {
          window.ExcelLocalBridge.ensureReady();
        }
      } catch (error) {
        console.error("[anti.html] No se pudo inicializar la capa local de Excel:", error);
      }
    })();
  </script>

  <!-- Módulos Anti -->
  <script src="anti-utils.js"></script>
  <script src="anti-bus.js"></script>
  <script src="anti-logic.js"></script>
  <script src="anti-ui-table.js"></script>
  <script src="anti-ui-actions.js"></script>
  <script src="anti-pdf-template.js"></script>
  <script src="anti-pdf-generator.js"></script>
  <script src="anti-core.js"></script>
</body>
</html>
