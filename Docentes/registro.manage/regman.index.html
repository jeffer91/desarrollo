<!-- =========================================================
Nombre del archivo: regman.index.html
Ruta - Ubicación: /registro.manage/regman.index.html
Función o funciones:
- Pantalla "Registro · Gestión"
- Registro y administración de docentes
- Búsqueda, filtros y tabla editable
- Carga masiva de docentes
- Modal de errores
- Botón Descargar Excel para exportar la tabla generada
Corrección aplicada:
- Se agrega botón regmanBtnExportExcel
- Se conservan los IDs usados por regman.dom.js y regman.app.js
- Se mantiene #regmanMsg sin crear encabezado visual duplicado
========================================================= -->
<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registro · Gestión</title>
  <link rel="stylesheet" href="./regman.styles.css" />
  <link rel="icon" href="data:," />
</head>

<body>
  <div class="wrap">
    <div id="regmanMsg" class="msg" data-type="info">Listo.</div>

    <section class="grid">
      <!-- =========================================================
      FORMULARIO
      ========================================================== -->
      <section class="card form-card">
        <div class="h3">Formulario</div>
        <div class="hr"></div>

        <div class="row">
          <label>Buscar docente para ver, editar o borrar</label>
          <input
            id="regmanSearch"
            class="cell"
            list="regmanSearchList"
            placeholder="Escribe y elige una cédula…"
          />
          <datalist id="regmanSearchList"></datalist>

          <div class="hint">
            Tip: elige una sugerencia y se cargará en el formulario. Luego usa
            <b>Guardar</b> o <b>Borrar</b>.
          </div>
        </div>

        <div class="hr"></div>

        <div class="actions">
          <button id="regmanBtnNew" class="btn ghost" type="button">Nuevo</button>
          <button id="regmanBtnSave" class="btn primary" type="button">Guardar</button>
          <button id="regmanBtnDelete" class="btn danger" type="button">Borrar</button>

          <button
            id="regmanBtnSwapNA"
            class="btn soft"
            type="button"
            title="Intercambia nombres y apellidos del docente cargado"
          >
            ↔ Nombres/Apellidos
          </button>
        </div>

        <div class="hr"></div>

        <div class="form">
          <div class="row">
            <label>Cédula</label>
            <input id="regmanCedula" class="cell" placeholder="Ej: 1712345678" />
          </div>

          <div class="row two">
            <div>
              <label>Nombres</label>
              <input id="regmanNombres" class="cell" placeholder="Ej: Juan Carlos" />
            </div>

            <div>
              <label>Apellidos</label>
              <input id="regmanApellidos" class="cell" placeholder="Ej: Pérez López" />
            </div>
          </div>

          <div class="row two">
            <div>
              <label>Sexo</label>
              <select id="regmanSexo" class="cell">
                <option value="">Selecciona…</option>
                <option value="F">Mujer</option>
                <option value="M">Hombre</option>
              </select>
            </div>

            <div>
              <label>Carrera</label>
              <select id="regmanCarrera" class="cell">
                <option value="">Selecciona carrera…</option>
              </select>
            </div>
          </div>

          <div class="row two">
            <div>
              <label>Celular</label>
              <input id="regmanCelular" class="cell" placeholder="Ej: 0999999999" />
            </div>

            <div>
              <label>Título</label>
              <input id="regmanTitulo" class="cell" placeholder="Ej: MSc. / Ing. / Dr." />
            </div>
          </div>
        </div>
      </section>

      <!-- =========================================================
      TABLA
      ========================================================== -->
      <section class="card table-card">
        <div class="table-head">
          <div>
            <div class="h3">Docentes registrados</div>
            <div class="muted">
              Tabla editable. Puedes buscar, filtrar, ordenar y descargar en Excel.
            </div>
          </div>
        </div>

        <div class="hr"></div>

        <div class="filterbar">
          <div class="filtergrow">
            <label class="sr" for="regmanTableSearch">Buscar en tabla</label>
            <input
              id="regmanTableSearch"
              class="cell"
              list="regmanTableSearchList"
              placeholder="Buscar por cédula, nombres, apellidos, carrera, celular o título…"
            />
            <datalist id="regmanTableSearchList"></datalist>
          </div>

          <div class="filteritem">
            <label class="sr" for="regmanFilterSexo">Filtrar por sexo</label>
            <select id="regmanFilterSexo" class="cell">
              <option value="">Sexo: Todos</option>
              <option value="F">Mujer</option>
              <option value="M">Hombre</option>
            </select>
          </div>

          <div class="filteritem filterwide">
            <label class="sr" for="regmanFilterCarrera">Filtrar por carrera</label>
            <select id="regmanFilterCarrera" class="cell">
              <option value="">Carrera: Todas</option>
            </select>
          </div>

          <div class="filteritem">
            <button id="regmanFilterClear" class="btn ghost" type="button">
              Limpiar filtros
            </button>
          </div>
        </div>

        <div class="hr"></div>

        <div class="actions">
          <button id="regmanBtnExportExcel" class="btn soft" type="button">
            Descargar Excel
          </button>

          <button id="regmanBtnLoad" class="btn primary" type="button">
            Carga masiva
          </button>

          <button id="regmanBtnFile" class="btn ghost" type="button">
            Importar archivo
          </button>

          <input
            id="regmanFileInput"
            type="file"
            accept=".txt,.csv,.tsv,.xlsx,.xls"
            hidden
          />

          <button id="regmanBtnErrors" class="btn warn" type="button" title="Ver filas con error">
            Errores
            <span id="regmanErrBadge" class="badge" hidden>0</span>
          </button>
        </div>

        <div class="hr"></div>

        <div id="regmanTableHost" class="table-host"></div>
      </section>
    </section>
  </div>

  <!-- =========================================================
  MODAL CARGA MASIVA
  ========================================================== -->
  <div id="regmanBulkModal" class="modal" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <div class="h3">Carga masiva</div>
        <button id="regmanBulkBtnClose" class="btn ghost" type="button">Cerrar</button>
      </div>

      <div class="hr"></div>

      <div class="row">
        <label>Pega aquí desde Excel, Sheets, CSV o texto</label>
        <textarea
          id="regmanBulkText"
          class="cell pastebox"
          rows="7"
          placeholder="Pega aquí y presiona Procesar. Mínimo: Nombres, Apellidos, Cédula. Opcional: Carrera, Sexo, Celular, Título."
        ></textarea>
      </div>

      <div class="actions">
        <button id="regmanBulkBtnProcess" class="btn primary" type="button">
          Procesar
        </button>

        <button id="regmanBulkBtnAdd" class="btn soft" type="button" disabled>
          Agregar
        </button>
      </div>

      <div class="hint" id="regmanBulkStats"></div>

      <div class="hr"></div>

      <div id="regmanBulkPreview" class="table-host"></div>
    </div>
  </div>

  <!-- =========================================================
  MODAL ERRORES
  ========================================================== -->
  <div id="regmanErrModal" class="modal" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <div class="h3">Errores en tabla</div>
        <button id="regmanErrBtnClose" class="btn ghost" type="button">Cerrar</button>
      </div>

      <div class="hr"></div>

      <div class="err-meta">
        <div class="muted">
          <b>Total con error:</b>
          <span id="regmanErrCount">0</span>
        </div>
        <div class="muted">Se detecta con la misma validación que Guardar.</div>
      </div>

      <div class="hr"></div>

      <div id="regmanErrList" class="table-host"></div>
    </div>
  </div>

  <!-- =========================================================

  ========================================================== -->
  <script type="module">
    import { bootRegManage } from "./regman.app.js";
    bootRegManage();
  </script>
</body>
</html>
