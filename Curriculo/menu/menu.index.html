<!-- =========================================================
Nombre del archivo: menu.index.html
Ruta o ubicación: /Curriculo/menu/menu.index.html
Función o funciones:
- Pantalla principal del menú del módulo Currículo
- Renderiza marca, navegación superior y frame principal
- Permite navegar entre Carrera y Materias
- Incluye botón para volver al panel principal
- Compatible con Live Server, doble clic y Electron
========================================================= -->
<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Currículo · Menú</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./menu.styles.css" />
</head>
<body>
  <div class="menu-shell">
    <header class="topbar" role="banner">
      <div class="topbar-left">
        <button
          id="menuBrandBtn"
          class="brand"
          type="button"
          title="Ir al inicio de Currículo"
          aria-label="Ir al inicio de Currículo"
        >
          <span class="brand-badge" aria-hidden="true">C</span>
          <span class="brand-text">
            <span class="brand-title">Currículo</span>
            <span class="brand-sub">Menú principal</span>
          </span>
        </button>
      </div>

      <div class="topbar-center">
        <nav id="menuNav" class="nav" aria-label="Navegación principal de Currículo"></nav>
      </div>

      <div class="topbar-right">
        <button
          id="menuRefresh"
          class="btn btn-primary"
          type="button"
          title="Refrescar vista actual"
        >
          ⟳ Refrescar
        </button>

        <div id="menuHint" class="hint" aria-live="polite">Listo.</div>

        <a
          class="btn btn-ghost"
          href="../../index.html"
          title="Volver al panel principal"
          aria-label="Volver al panel principal"
        >
          ← Volver al panel
        </a>
      </div>
    </header>

    <main class="main" role="main">
      <div class="frame-wrap">
        <iframe
          id="menuFrame"
          class="frame"
          title="Contenido de Currículo"
          referrerpolicy="no-referrer"
          loading="eager"
        ></iframe>
      </div>
    </main>
  </div>

  <script src="./menu.config.js"></script>
  <script src="./menu.router.js"></script>
  <script src="./menu.render.js"></script>
  <script src="./menu.boot.js"></script>
</body>
</html>
