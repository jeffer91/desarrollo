<!-- =========================================================
Nombre completo: menu.index.html
Ruta o ubicación: /Curriculo/menu/menu.index.html
Función o funciones:
- Mostrar la pantalla principal del menú del módulo Currículo
- Renderizar marca, navegación superior, estado local y frame principal
- Permitir navegar entre Inicio, Base local, Carreras, Materias, PEA, Fichas, Actas y Control
- Incluir botones para refrescar y abrir la vista actual
- Cargar el motor de Base local para inicialización diaria desde Currículo
========================================================= -->
<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Currículo · Menú</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./menu.styles.css" />
</head>
<body>
  <div class="menu-shell">
    <header class="topbar" role="banner">
      <div class="topbar-left">
        <button
          id="menuBrandBtn"
          class="brand"
          type="button"
          title="Ir al inicio de Currículo"
          aria-label="Ir al inicio de Currículo"
        >
          <span class="brand-badge" aria-hidden="true">C</span>
          <span class="brand-text">
            <span class="brand-title">Currículo</span>
            <span class="brand-sub">Menú principal</span>
          </span>
        </button>
      </div>

      <div class="topbar-center">
        <nav
          id="menuNav"
          class="nav"
          aria-label="Navegación principal de Currículo"
        ></nav>
      </div>

      <div class="topbar-right">
        <button
          id="menuOpenCurrent"
          class="btn btn-ghost"
          type="button"
          title="Abrir vista actual en pestaña nueva"
          aria-label="Abrir vista actual en pestaña nueva"
        >
          Abrir
        </button>

        <button
          id="menuRefresh"
          class="btn btn-primary"
          type="button"
          title="Refrescar vista actual"
          aria-label="Refrescar vista actual"
        >
          Refrescar
        </button>

        <div class="status-stack">
          <div id="menuHint" class="hint" aria-live="polite">Listo.</div>
          <div data-curriculo-sync-status class="sync-hint" aria-live="polite">
            Preparando guardado local...
          </div>
        </div>
      </div>
    </header>

    <main class="main" role="main">
      <div class="frame-wrap">
        <iframe
          id="menuFrame"
          class="frame"
          title="Contenido de Currículo"
          referrerpolicy="no-referrer"
          loading="eager"
        ></iframe>
      </div>
    </main>
  </div>

  <script src="../shared/local/curriculo.local-db.js"></script>
  <script src="../shared/local/curriculo.sync-queue.js"></script>
  <script src="../shared/local/curriculo.sync-status.js"></script>

  <script src="../Base%20local/core/bl.config.js"></script>
  <script src="../Base%20local/core/bl.utils.js"></script>
  <script src="../Base%20local/core/bl.logger.js"></script>
  <script src="../Base%20local/core/bl.storage.js"></script>
  <script src="../Base%20local/core/bl.schema.js"></script>
  <script src="../Base%20local/core/bl.compare.js"></script>
  <script src="../Base%20local/core/bl.backup.js"></script>
  <script src="../Base%20local/core/bl.diagnostics.js"></script>
  <script src="../Base%20local/core/bl.sync.firebase.js"></script>
  <script src="../Base%20local/modulos/bl.carreras.js"></script>
  <script src="../Base%20local/modulos/bl.materias.js"></script>
  <script src="../Base%20local/modulos/bl.fichas.js"></script>
  <script src="../Base%20local/modulos/bl.actas.js"></script>
  <script src="../Base%20local/modulos/bl.pea-documentos.js"></script>
  <script src="../Base%20local/modulos/bl.control.js"></script>
  <script src="../Base%20local/modulos/bl.menu.js"></script>
  <script>
    (function iniciarBaseLocalDiaria(window, document) {
      "use strict";

      async function run() {
        var BL = window.CurriculoBL;
        var estado;
        var ultimaCarga;
        var debeCargar;
        var adapter;

        if (!BL || !BL.storage || !BL.utils) return;

        try {
          await BL.storage.initialize();
          estado = await BL.storage.readStore("estado");
          ultimaCarga = estado && estado.cargaAutomatica ? estado.cargaAutomatica.ultimaCarga : null;
          debeCargar = typeof BL.utils.shouldRunDaily === "function" ? BL.utils.shouldRunDaily(ultimaCarga) : true;

          if (debeCargar) {
            await BL.storage.patchStore("estado", {
              cargaAutomatica: {
                activa: true,
                frecuencia: "una vez al dia al abrir Curriculo",
                ultimaCarga: BL.utils.nowISO ? BL.utils.nowISO() : new Date().toISOString()
              }
            });
            BL.logger && BL.logger.info && BL.logger.info("Base local cargada automaticamente al abrir Curriculo.");
          } else {
            BL.logger && BL.logger.info && BL.logger.info("Base local no se recargo; ya fue cargada hoy.");
          }

          if (BL.syncFirebase && typeof BL.syncFirebase.getFirebaseAdapter === "function") {
            adapter = BL.syncFirebase.getFirebaseAdapter();
            if (adapter && adapter.disponible && typeof BL.syncFirebase.syncDailyIfNeeded === "function") {
              await BL.syncFirebase.syncDailyIfNeeded();
            } else if (BL.logger && BL.logger.info) {
              BL.logger.info("Sincronizacion diaria no ejecutada: adaptador Firebase de Curriculo aun no disponible.");
            }
          }
        } catch (error) {
          if (BL && BL.logger && BL.logger.error) {
            BL.logger.error("No se pudo iniciar Base local desde el menu Curriculo.", { error: error.message });
          }
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", run);
      } else {
        run();
      }
    })(window, document);
  </script>

  <script src="./menu.config.js"></script>
  <script src="./menu.router.js"></script>
  <script src="./menu.render.js"></script>
  <script src="./menu.boot.js"></script>
</body>
</html>
