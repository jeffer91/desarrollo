<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Currículo · Materias</title>
<style>
:root{
  --mat-bg:#f4f6fb;
  --mat-surface:#fff;
  --mat-border:#d7ddea;
  --mat-border-soft:#e9edf5;
  --mat-text:#1e293b;
  --mat-muted:#64748b;
  --mat-primary:#2563eb;
  --mat-primary-soft:#dbeafe;
  --mat-success:#16a34a;
  --mat-danger:#dc2626;
  --mat-radius:14px;
  --mat-shadow:0 8px 22px rgba(15,23,42,.07);
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--mat-bg);color:var(--mat-text)}
.mat-app{width:min(1200px,calc(100% - 24px));margin:12px auto;display:grid;gap:12px}
.mat-card{background:var(--mat-surface);border:1px solid var(--mat-border);border-radius:var(--mat-radius);box-shadow:var(--mat-shadow);padding:14px}
.mat-head{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
.mat-title{margin:0;font-size:21px;line-height:1.2}
.mat-actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.mat-btn{border:1px solid var(--mat-border);background:#fff;color:var(--mat-text);border-radius:10px;padding:9px 13px;font-size:13px;font-weight:700;cursor:pointer}
.mat-btn:hover{border-color:#b9c4da}
.mat-btn.primary{background:var(--mat-primary);border-color:var(--mat-primary);color:#fff}
.mat-btn.primary:disabled{opacity:.6;cursor:not-allowed}
.mat-sync-line{display:inline-flex;margin-top:6px;border:1px solid var(--mat-border-soft);background:#f8fafc;color:var(--mat-muted);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:700;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mat-sync-line[data-curriculo-sync-pending="0"]{background:#f0fdf4;border-color:#bbf7d0;color:#166534}
.mat-workspace{display:grid;grid-template-columns:180px minmax(0,1fr);gap:14px;align-items:start}
.mat-sidebar{border-right:1px solid var(--mat-border-soft);padding-right:14px;display:grid;gap:10px}
.mat-side-label{font-size:11px;font-weight:800;color:var(--mat-muted);letter-spacing:.04em;text-transform:uppercase}
.mat-side-menu{display:grid;gap:8px}
.mat-side-btn{width:100%;border:1px solid var(--mat-border);background:#fff;color:var(--mat-text);border-radius:11px;padding:10px 12px;text-align:left;font-size:13px;font-weight:800;cursor:pointer}
.mat-side-btn:hover{border-color:#93c5fd;background:#eff6ff;color:#1d4ed8}
.mat-side-btn.is-active{background:var(--mat-primary);border-color:var(--mat-primary);color:#fff;box-shadow:0 8px 18px rgba(37,99,235,.18)}
.mat-hidden-select{display:none!important}
.mat-panel{display:grid;gap:10px;min-width:0}
.mat-fields{display:grid;grid-template-columns:1fr 230px;gap:12px;align-items:start}
.mat-field{display:grid;gap:6px}
.mat-label{font-size:11px;font-weight:800;color:var(--mat-muted);text-transform:uppercase;letter-spacing:.03em}
.mat-input,.mat-select,.mat-textarea{width:100%;border:1px solid var(--mat-border);border-radius:10px;padding:10px 12px;font:inherit;color:var(--mat-text);background:#fff}
.mat-input[readonly]{background:#f8fafc}
.mat-textarea{min-height:240px;resize:vertical;line-height:1.45}
.mat-inline-tools{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.mat-hint{font-size:12px;color:var(--mat-muted);line-height:1.35}
.mat-status{border:1px dashed var(--mat-border);background:#fbfcff;color:var(--mat-muted);border-radius:11px;padding:8px 10px;font-size:12px;line-height:1.35}
.mat-status.ok{border-color:#bbf7d0;background:#f0fdf4;color:#166534}
.mat-status.warn{border-color:#fde68a;background:#fffbeb;color:#92400e}
.mat-status.error{border-color:#fecaca;background:#fef2f2;color:#991b1b}
.mat-preview{min-height:220px;border:1px solid var(--mat-border-soft);border-radius:12px;background:#fcfdff;padding:12px;overflow:auto}
.mat-preview h3{margin:0 0 8px;font-size:14px}
.mat-preview ul{margin:8px 0 0 18px;padding:0}
.mat-preview li{margin:4px 0;font-size:13px}
.mat-editor{display:grid;gap:10px;min-height:90px;border:1px dashed var(--mat-border);border-radius:12px;padding:12px;background:linear-gradient(180deg,#fff 0%,#fbfdff 100%)}
.mat-editor strong{font-size:13px}
.mat-editor p{margin:0;color:var(--mat-muted);font-size:13px;line-height:1.4}
.mat-editor-intro{margin-top:-2px;color:var(--mat-muted)}
.mat-editor-accordion{border:1px solid var(--mat-border-soft);border-radius:12px;background:#fff;overflow:hidden}
.mat-editor-accordion[open]{border-color:#c7d2fe;box-shadow:0 8px 20px rgba(37,99,235,.06)}
.mat-editor-summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:10px;padding:11px 13px;background:#f8fafc;user-select:none}
.mat-editor-summary::-webkit-details-marker{display:none}
.mat-editor-summary::after{content:"▾";margin-left:8px;color:var(--mat-muted);font-size:12px;transition:transform .18s ease}
.mat-editor-accordion[open]>.mat-editor-summary::after{transform:rotate(180deg)}
.mat-editor-summary-main{font-size:13px;font-weight:800;color:var(--mat-text)}
.mat-editor-summary-count{margin-left:auto;padding:4px 8px;border-radius:999px;background:#e8f0ff;color:#1d4ed8;font-size:11px;font-weight:800;line-height:1;white-space:nowrap}
.mat-editor-panel{display:grid;gap:10px;padding:12px;border-top:1px solid var(--mat-border-soft);background:#fff}
.mat-editor-helper{font-size:12px;color:var(--mat-muted);line-height:1.35}
.mat-editor-list{display:grid;gap:8px}
.mat-editor-item{display:grid;grid-template-columns:34px minmax(0,1fr) auto;gap:8px;align-items:center}
.mat-editor-item-index{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:10px;border:1px solid var(--mat-border-soft);background:#f8fafc;color:var(--mat-muted);font-size:12px;font-weight:800}
.mat-editor-item-input{width:100%;min-width:0;border:1px solid var(--mat-border);border-radius:10px;padding:9px 11px;font:inherit;color:var(--mat-text);background:#fff}
.mat-editor-item-input:focus{outline:none;border-color:#93c5fd;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.mat-editor-item-remove{border:1px solid #fecaca;background:#fff5f5;color:#b91c1c;border-radius:10px;padding:8px 11px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap}
.mat-editor-item-remove:hover{background:#fef2f2}
.mat-editor-inline-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
.mat-editor-add{border:1px dashed #bfdbfe;background:#eff6ff;color:#1d4ed8;border-radius:10px;padding:8px 11px;font-size:12px;font-weight:800;cursor:pointer}
.mat-editor-add:hover{background:#dbeafe}
.mat-summary{min-height:42px;border:1px solid var(--mat-border-soft);border-radius:12px;background:#fcfdff;padding:10px 12px;font-size:13px;line-height:1.35}
.mat-quick-summary{border:1px solid var(--mat-border-soft);border-radius:10px;background:#f8fafc;padding:8px 10px;display:grid;gap:4px;font-size:12px;line-height:1.35}
.mat-quick-summary-title{font-size:11px;font-weight:800;color:var(--mat-muted);text-transform:uppercase;letter-spacing:.03em}
.mat-quick-summary-line{display:flex;gap:6px;align-items:flex-start;flex-wrap:wrap}
.mat-quick-summary-label{font-weight:800;color:var(--mat-text);flex:0 0 auto}
.mat-quick-summary-text{color:var(--mat-muted);flex:1 1 auto;min-width:0}
.mat-modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(15,23,42,.48);z-index:9999}
.mat-modal.is-open{display:flex}
.mat-modal-panel{width:min(1100px,100%);max-height:calc(100vh - 40px);overflow:auto;background:var(--mat-surface);border:1px solid var(--mat-border);border-radius:18px;box-shadow:0 24px 60px rgba(15,23,42,.22);padding:16px;display:grid;gap:14px}
.mat-modal-head{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
.mat-modal-title{margin:0;font-size:18px;line-height:1.2}
.mat-modal-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}
.mat-modal-close{border:1px solid var(--mat-border);background:#fff;color:var(--mat-text);border-radius:10px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer}
@media(max-width:900px){.mat-head,.mat-workspace,.mat-modal-grid{grid-template-columns:1fr}.mat-sidebar{border-right:0;border-bottom:1px solid var(--mat-border-soft);padding-right:0;padding-bottom:12px}.mat-side-menu{grid-template-columns:repeat(4,minmax(0,1fr))}.mat-fields{grid-template-columns:1fr}}
@media(max-width:720px){.mat-side-menu{grid-template-columns:1fr 1fr}.mat-editor-item{grid-template-columns:1fr}.mat-editor-item-index{width:34px;height:34px}.mat-editor-item-remove{justify-self:flex-start}}
</style>
</head>
<body>
<main class="mat-app">
  <section class="mat-card">
    <div class="mat-head">
      <div>
        <h1 class="mat-title">Materias</h1>
        <div id="mat-sync-status" data-curriculo-sync-status class="mat-sync-line" aria-live="polite">Preparando guardado local...</div>
      </div>
      <div class="mat-actions">
        <button id="mat-refresh-btn" class="mat-btn" type="button">Recargar carreras</button>
        <button id="mat-save-btn" class="mat-btn primary" type="button" disabled>Guardar</button>
      </div>
    </div>
  </section>

  <section class="mat-card mat-workspace">
    <aside class="mat-sidebar" aria-label="Tipo de materias">
      <div class="mat-side-label">Tipo</div>
      <div id="mat-load-type-menu" class="mat-side-menu"></div>
      <select id="mat-load-type-select" class="mat-hidden-select" aria-hidden="true" tabindex="-1"></select>
    </aside>

    <section class="mat-panel" aria-label="Selección de carrera">
      <div class="mat-fields">
        <div class="mat-field">
          <label class="mat-label" for="mat-career-select">Carrera</label>
          <select id="mat-career-select" class="mat-select"><option value="">Cargando carreras...</option></select>
        </div>
        <div class="mat-field">
          <label class="mat-label" for="mat-career-type-display">Tipo de carrera</label>
          <input id="mat-career-type-display" class="mat-input" type="text" value="Sin seleccionar" readonly>
        </div>
      </div>

      <div id="mat-career-quick-summary" class="mat-quick-summary" aria-live="polite">
        <div class="mat-quick-summary-title">Resumen</div>
        <div class="mat-quick-summary-line"><span class="mat-quick-summary-label">Estado:</span><span class="mat-quick-summary-text">Selecciona una carrera.</span></div>
      </div>

      <div class="mat-inline-tools">
        <button id="mat-open-massive-btn" class="mat-btn" type="button">Carga masiva</button>
        <div class="mat-hint" id="mat-editor-hint">Por defecto se muestran las materias de carrera.</div>
      </div>

      <div id="mat-status" class="mat-status">Listo.</div>
    </section>
  </section>

  <section class="mat-card">
    <div id="mat-editor" class="mat-editor"><strong>Editor</strong><p>Selecciona una carrera.</p></div>
  </section>

  <section class="mat-card">
    <div id="mat-save-summary" class="mat-summary"><p style="margin:0;color:#64748b;">Sin cambios guardados.</p></div>
  </section>
</main>

<div id="mat-massive-modal" class="mat-modal" aria-hidden="true">
  <div id="mat-massive-modal-panel" class="mat-modal-panel" role="dialog" aria-modal="true" aria-labelledby="mat-massive-modal-title">
    <div class="mat-modal-head">
      <div><h2 id="mat-massive-modal-title" class="mat-modal-title">Carga masiva</h2><div style="margin-top:4px;color:#64748b;font-size:12px;">Pega, procesa y aplica.</div></div>
      <button id="mat-modal-close-btn" class="mat-modal-close" type="button">Cerrar</button>
    </div>
    <div id="mat-modal-status" class="mat-status">Pega el contenido y procesa.</div>
    <div class="mat-modal-grid">
      <section class="mat-card" style="padding:12px;">
        <div class="mat-field"><label class="mat-label" for="mat-modal-massive-input">Texto a importar</label><textarea id="mat-modal-massive-input" class="mat-textarea" placeholder="Pega aquí el contenido."></textarea></div>
        <div class="mat-actions" style="margin-top:12px;"><button id="mat-modal-process-btn" class="mat-btn" type="button">Procesar</button><button id="mat-modal-clear-btn" class="mat-btn" type="button">Limpiar</button><button id="mat-modal-apply-btn" class="mat-btn primary" type="button" disabled>Aplicar</button></div>
      </section>
      <section class="mat-card" style="padding:12px;"><div id="mat-modal-preview" class="mat-preview" style="min-height:100%;"><h3>Vista previa</h3><div id="mat-modal-preview-body">Sin datos procesados.</div></div></section>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="../shared/local/curriculo.local-db.js"></script>
<script src="../shared/local/curriculo.sync-queue.js"></script>
<script src="../shared/local/curriculo.sync-engine.js"></script>
<script src="../shared/local/curriculo.sync-status.js"></script>

<script src="frontend/core/mat.config.js"></script>
<script src="frontend/core/mat.state.js"></script>
<script src="frontend/core/mat.local-patch.js"></script>
<script src="frontend/ui/mat.ui.js"></script>
<script src="frontend/ui/mat.ui.carrera-summary.js"></script>
<script src="frontend/ui/mat.ui.modal.js"></script>
<script src="frontend/ui/mat.ui.resumen.js"></script>
<script src="frontend/selectores/mat.selector.carreras.js"></script>
<script src="frontend/selectores/mat.selector.tipo-carga.js"></script>
<script src="frontend/editores/mat.editor.base.js"></script>
<script src="backend/firebase/mat.firebase.js"></script>
<script src="backend/firebase/mat.refs.js"></script>
<script src="backend/carreras/mat.carreras.leer.js"></script>
<script src="backend/carreras/mat.carreras.leer-una.js"></script>
<script src="backend/carreras/mat.carreras.tipo.js"></script>
<script src="backend/carreras/mat.carreras.cargar-bloque.js"></script>
<script src="backend/validacion/mat.validar.general.js"></script>
<script src="backend/carga/mat.merge.js"></script>
<script src="backend/carga/mat.snapshot.js"></script>
<script src="backend/carga/mat.actualizar.js"></script>
<script src="backend/carga/mat.guardar.js"></script>
<script src="frontend/tabla/mat.tabla.js"></script>
<script src="frontend/tabla/mat.tabla.render.js"></script>
<script src="frontend/tabla/mat.tabla.acciones.js"></script>
<script src="frontend/tabla/mat.tabla.edicion.js"></script>
<script src="frontend/editores/mat.editor.cargar-desde-db.js"></script>
<script src="frontend/carga-masiva/mat.masiva.modal.js"></script>
<script src="frontend/carga-masiva/mat.masiva.parser.js"></script>
<script src="frontend/carga-masiva/mat.masiva.procesar.js"></script>
<script src="frontend/carga-masiva/mat.masiva.aplicar.js"></script>
<script src="frontend/core/mat.main.js"></script>
<script src="frontend/core/mat.load-current.js"></script>
</body>
</html>
