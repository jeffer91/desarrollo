<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>documentos</title>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%232563eb'/%3E%3Cpath d='M20 18h16a8 8 0 0 1 8 8v20a0 0 0 0 1 0 0H20a4 4 0 0 1-4-4V22a4 4 0 0 1 4-4z' fill='white' opacity='.95'/%3E%3Cpath d='M24 28h16M24 34h16M24 40h12' stroke='%232563eb' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E" />

  <style>
    :root{
      --bg:#f6f8fc;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --blue:#2563eb;
      --shadow:0 12px 30px rgba(2, 6, 23, .10);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 400px at 20% 0%, #eaf1ff 0%, var(--bg) 55%),
        radial-gradient(900px 350px at 85% 10%, #ffecec 0%, var(--bg) 60%);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      width:min(720px, 100%);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
    }
    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }
    .logo{
      width:44px;height:44px;
      border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      font-weight:900;
      background:linear-gradient(135deg, var(--blue) 0%, #60a5fa 55%, #93c5fd 100%);
      color:#fff;
      box-shadow:0 12px 24px rgba(37, 99, 235, .22);
      user-select:none;
    }
    h1{margin:0;font-size:18px;line-height:1.1}
    p{margin:6px 0 0 0;color:var(--muted);font-size:13px}
    .btn{
      border:1px solid transparent;
      border-radius:12px;
      padding:10px 12px;
      cursor:pointer;
      font-weight:800;
      font-size:13px;
      background:var(--blue);
      color:#fff;
      box-shadow:0 10px 18px rgba(37, 99, 235, .18);
      user-select:none;
    }
    .btn:active{transform:translateY(1px)}
    .info{
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid var(--line);
      font-size:13px;
      color:var(--muted);
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    code{
      background:#f1f5f9;
      padding:2px 6px;
      border-radius:8px;
      border:1px solid #e2e8f0;
      color:#0f172a;
    }
  </style>
</head>
<body>
  <div class="card" role="main" aria-label="Inicio de documentos">
    <div class="row">
      <div class="brand">
        <div class="logo" aria-hidden="true">D</div>
        <div>
          <h1>documentos</h1>
          <p>Biblioteca de documentos y certificados</p>
        </div>
      </div>
      <button id="go" class="btn" type="button">Entrar</button>
    </div>

    <div class="info">
      <div>Inicio: <code>screens/screen-lista/list.ui.html</code></div>
      <div>Modo: <code>web</code> sin modo oscuro</div>
    </div>
  </div>

  <script>
    (function(){
      const target = "./screens/screen-lista/list.ui.html";
      const go = document.getElementById("go");
      go.addEventListener("click", () => window.location.href = target);
      // Redirección inmediata para flujo rápido
      window.location.replace(target);
    })();
  </script>
</body>
</html>
