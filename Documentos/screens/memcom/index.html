<!-- =========================================================
Nombre completo: index.html
Ruta: /screens/memcom/index.html
Función o funciones:
- Mostrar la pantalla principal del módulo Memorando de Cronograma.
- Permitir seleccionar 1, 2, 3 o 4 tablas para un mismo memorando.
- Cargar estilos, Firebase, Firestore, jsPDF y scripts del módulo memcom.
- Mantener el orden correcto de scripts para memoria, secuencia, tablas, PDF y app.
========================================================= -->

<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://cdn.jsdelivr.net;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data:;
    font-src 'self';
    connect-src 'self' https://firestore.googleapis.com https://www.googleapis.com;"
  />
  <title>Memo Cronograma</title>
  <link rel="stylesheet" href="./memcom.styles.css" />
</head>

<body>
  <header class="topbar">
    <div class="topbar_brand">
      <div class="logo">M</div>
      <div>
        <div class="topbar_title">Memorando</div>
        <div class="topbar_subtitle">Cronograma APA 7</div>
      </div>
    </div>

    <div class="topbar_right">
      <button id="mc-btn-volver" class="btn btn--small btn--ghost" type="button">⬅ Volver</button>
      <div id="mc-status" class="status-pill">Inicializando.</div>
    </div>
  </header>

  <main class="wrap">
    <section class="toolbar card">
      <div class="toolbar_inputs">
        <div class="field">
          <label for="mc-periodo">Periodo de Titulación</label>
          <select id="mc-periodo">
            <option value="">Cargando.</option>
          </select>
        </div>

        <div class="field">
          <label for="mc-tipo">Tipo de Proceso</label>
          <select id="mc-tipo">
            <option value="EXAMEN COMPLEXIVO" selected>Examen Complexivo</option>
            <option value="TRABAJO DE TITULACIÓN">Trabajo de Titulación</option>
            <option value="ARTÍCULO ACADÉMICO">Artículo Académico</option>
          </select>
        </div>

        <div class="field">
          <label for="mc-num-tablas">Cantidad de tablas</label>
          <select id="mc-num-tablas">
            <option value="1" selected>1 tabla</option>
            <option value="2">2 tablas</option>
            <option value="3">3 tablas</option>
            <option value="4">4 tablas</option>
          </select>
        </div>

        <div class="field full-width">
          <small class="help help--strong">
            Cada tabla tendrá su propio título y saldrá dentro del mismo memorando. El código del memorando se genera una sola vez.
          </small>
        </div>
      </div>

      <div id="mc-tables-container" class="mc-tables-container" aria-label="Bloques de tablas"></div>

      <div class="toolbar_actions">
        <button id="mc-btn-refrescar" class="btn btn--secondary" type="button">Refrescar</button>
        <button id="mc-btn-preview" class="btn btn--secondary" type="button">Procesar tablas</button>
        <button id="mc-btn-pdf" class="btn btn--primary" type="button" disabled>
          <span class="icon">⬇</span> Generar Memo PDF
        </button>
      </div>
    </section>

    <section id="mc-table-preview" class="table-preview-container" hidden>
      <h3>Datos detectados para el PDF:</h3>
      <div id="mc-table-preview-list"></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <script src="./memcom.firebase-init.js"></script>
  <script src="./memcom.data-remote.js"></script>
  <script src="./memcom.memo-store.js"></script>
  <script src="./memcom.sequence.js"></script>
  <script src="./memcom.tables.js"></script>
  <script src="./memcom.pdf.js"></script>
  <script src="./memcom.app.js"></script>
</body>
</html>
