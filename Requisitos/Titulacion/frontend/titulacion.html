<!doctype html>
<!-- =========================================================
Nombre completo: titulacion.html
Ruta o ubicación: /Requisitos/Titulacion/frontend/titulacion.html
Función o funciones:
- Mostrar el módulo Infor del bloque Requisitos.
- Presentar información rápida de titulación basada en BaseLocal.
- Resumir estudiantes listos, pendientes y no habilitados.
- Generar textos informativos y exportar resumen.
Con qué se conecta:
- titulacion.css
- titulacion.core.js
- titulacion.export.js
- titulacion.app.js
- ../../Gestion/Excel/excel-local/excel-local.config.js
- ../../Gestion/Excel/excel-local/excel-local.storage.js
- ../../Gestion/Excel/excel-local.repo.js
========================================================= -->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="stylesheet" href="titulacion.css" />
</head>
<body>
  <main class="infor-app">
    <section id="infor-status" class="infor-status">Cargando Infor...</section>

    <section class="infor-tools">
      <label>Período<select id="infor-periodo"><option value="">Todos</option></select></label>
      <label>Carrera<select id="infor-carrera"><option value="">Todas</option></select></label>
      <label>Vista<select id="infor-vista"><option value="resumen">Resumen</option><option value="guia">Guía rápida</option><option value="comunicado">Comunicado</option></select></label>
      <button id="infor-refresh" type="button">Actualizar</button>
      <button id="infor-copy" type="button">Copiar texto</button>
      <button id="infor-export-json" type="button">Exportar JSON</button>
    </section>

    <section class="infor-kpis">
      <article><span>Total estudiantes</span><strong id="infor-total">0</strong></article>
      <article><span>Listos</span><strong id="infor-listos">0</strong></article>
      <article><span>Con pendientes</span><strong id="infor-pendientes">0</strong></article>
      <article><span>No habilitados</span><strong id="infor-no">0</strong></article>
      <article><span>Avance</span><strong id="infor-avance">0%</strong></article>
    </section>

    <section class="infor-grid">
      <article class="infor-card">
        <div class="infor-card-head"><h2>Información principal</h2><span id="infor-generated-at">—</span></div>
        <textarea id="infor-text" readonly></textarea>
      </article>

      <article class="infor-card">
        <div class="infor-card-head"><h2>Guía de uso</h2><span>Bloque Requisitos</span></div>
        <div id="infor-guide" class="infor-guide"></div>
      </article>
    </section>

    <section class="infor-grid">
      <article class="infor-card">
        <div class="infor-card-head"><h2>Resumen por carrera</h2><span id="infor-carreras-meta">0 carreras</span></div>
        <div id="infor-carreras" class="infor-table-wrap"></div>
      </article>
      <article class="infor-card">
        <div class="infor-card-head"><h2>Requisitos con mayor atención</h2><span>Ordenado por prioridad</span></div>
        <div id="infor-requisitos" class="infor-table-wrap"></div>
      </article>
    </section>

    <section class="infor-card">
      <div class="infor-card-head"><h2>Diagnóstico de Infor</h2><span>BaseLocal</span></div>
      <pre id="infor-diagnostics"></pre>
    </section>
  </main>

  <script src="../../Gestion/Excel/excel-local/excel-local.config.js"></script>
  <script src="../../Gestion/Excel/excel-local/excel-local.storage.js"></script>
  <script src="../../Gestion/Excel/excel-local/excel-local.bridge.js"></script>
  <script src="../../Gestion/Excel/excel-local.repo.js"></script>
  <script src="titulacion.core.js"></script>
  <script src="titulacion.export.js"></script>
  <script src="titulacion.app.js"></script>
</body>
</html>
