<!DOCTYPE html>
<!-- =========================================================
Nombre completo: excel.html
Ruta o ubicación: /Requisitos/Gestion/Excel/excel.html
Función o funciones:
- Pantalla inicial del módulo Excel/Requisito.
- Mantener los IDs principales para que el motor Excel se conecte en el bloque 2.
- No mostrar título propio porque el título lo controla Maqueta.
Con qué se conecta:
- /Requisitos/Gestion/Excel/excel.css
- /Requisitos/Gestion/Excel/excel-ui.js y servicios del bloque 2
========================================================= -->
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title></title><link rel="stylesheet" href="excel.css"/><script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script></head><body><main class="excel-page"><section class="excel-card"><h2>1. Crear período</h2><div class="excel-grid excel-grid-5"><label>Inicio mes<select id="inicioMes"><option value="1">1 - Enero</option><option value="2">2 - Febrero</option><option value="3">3 - Marzo</option><option value="4">4 - Abril</option><option value="5">5 - Mayo</option><option value="6">6 - Junio</option><option value="7">7 - Julio</option><option value="8">8 - Agosto</option><option value="9">9 - Septiembre</option><option value="10">10 - Octubre</option><option value="11">11 - Noviembre</option><option value="12">12 - Diciembre</option></select></label><label>Inicio año<input id="inicioAnio" type="number" min="2000" max="2100" step="1"/></label><label>Fin mes<select id="finMes"><option value="1">1 - Enero</option><option value="2">2 - Febrero</option><option value="3">3 - Marzo</option><option value="4">4 - Abril</option><option value="5">5 - Mayo</option><option value="6">6 - Junio</option><option value="7">7 - Julio</option><option value="8">8 - Agosto</option><option value="9">9 - Septiembre</option><option value="10">10 - Octubre</option><option value="11">11 - Noviembre</option><option value="12">12 - Diciembre</option></select></label><label>Fin año<input id="finAnio" type="number" min="2000" max="2100" step="1"/></label><button id="excel-add-period-btn" class="btn primary" type="button">Crear período</button></div></section><section class="excel-card"><h2>2. Cargar archivo</h2><div class="excel-grid excel-grid-file"><label>Período<select id="excel-cargar-period-select"></select></label><label>Archivo Excel<input id="excel-file-input" type="file" accept=".xlsx,.xls,.csv"/></label><button id="excel-analyze-save-btn" class="btn primary" type="button">Analizar</button></div></section><section class="excel-card"><h2>3. Resumen</h2><div class="excel-grid excel-grid-2"><div><h3>Esquema</h3><pre id="excel-schema-box"></pre></div><div><h3>Consolidado</h3><pre id="excel-summary-box"></pre></div></div></section><section class="excel-card"><h2>4. Borrado</h2><div class="excel-grid excel-grid-delete"><label>Período<select id="excel-delete-period-select"></select></label><div><span class="muted">Alumnos del período</span><strong id="excel-delete-students-count">—</strong></div><button id="excel-delete-students-btn" class="btn danger ghost" type="button">Borrar alumnos</button><button id="excel-delete-period-full-btn" class="btn danger" type="button">Borrar período completo</button></div></section><section class="excel-card"><h2>5. Historial</h2><div id="excel-history">Pendiente de cargar motor Excel en bloque 2.</div></section><section id="excel-force-upload-section" class="excel-card"><h2>6. Forzar carga a Firebase</h2><p class="muted">Sube manualmente el período seleccionado con todos sus estudiantes e historial.</p><div class="excel-grid excel-grid-delete"><label>Período<select id="excel-force-period-select"></select></label><div><span class="muted">Estudiantes</span><strong id="excel-force-students-count">—</strong></div><div><span class="muted">Historial</span><strong id="excel-force-history-count">—</strong></div><button id="excel-force-upload-btn" class="btn primary" type="button">Forzar carga</button></div><div id="excel-force-upload-status"></div></section></main><script>(function(){var y=new Date().getFullYear();var ini=document.getElementById("inicioAnio");var fin=document.getElementById("finAnio");if(ini&&!ini.value)ini.value=String(y);if(fin&&!fin.value)fin.value=String(y);console.info("[excel.html] Pantalla base recuperada. El motor funcional se integra en el bloque 2.");})();</script></body></html>
