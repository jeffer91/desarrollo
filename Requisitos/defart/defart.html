<!doctype html>
<!-- =========================================================
Nombre completo: defart.html
Ruta o ubicación: /Requisitos/defart/defart.html
Función o funciones:
- Pantalla Defensas para cargar N-ART y N-DEF desde BaseLocal.
- Calcular N-FIN con 70% artículo y 30% defensa.
- Filtrar por período, carrera, estado, sede y búsqueda.
- Guardar notas en BaseLocal; BL sincroniza Firebase.
- Descargar Excel visible de notas.
Con qué se conecta:
- defart.css
- defart.core.js
- defart.export.js
- defart.app.js
- ../Gestion/Excel/excel-local/excel-local.config.js
- ../Gestion/Excel/excel-local/excel-local.storage.js
- ../Gestion/Excel/excel-local/excel-local.bridge.js
- ../Gestion/Excel/excel-local.repo.js
========================================================= -->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="stylesheet" href="defart.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <main class="def-app">
    <section id="def-status" class="def-status">Cargando Defensas...</section>

    <section class="def-toolbar">
      <label>Período
        <select id="def-filter-periodo"><option value="">Todos</option></select>
      </label>
      <label>Carrera
        <select id="def-filter-carrera"><option value="">Todas</option></select>
      </label>
      <label>Estado
        <select id="def-filter-estado">
          <option value="">Todos</option>
          <option value="Sin requisitos">Sin requisitos</option>
          <option value="Pendiente Art">Pendiente Art</option>
          <option value="Supletorio Art">Supletorio Art</option>
          <option value="Pendiente Def">Pendiente Def</option>
          <option value="Supletorio Def">Supletorio Def</option>
          <option value="Completo">Completo</option>
        </select>
      </label>
      <label>Sede
        <select id="def-filter-sede"><option value="">Todas</option></select>
      </label>
      <label>Buscar
        <input id="def-filter-search" type="search" placeholder="Cédula, nombre o carrera..." />
      </label>
      <div class="def-toolbar-actions">
        <button id="def-btn-refresh" type="button">Actualizar</button>
        <button id="def-btn-save" type="button">Guardar todo</button>
        <button id="def-btn-export" type="button">Descargar Excel</button>
      </div>
    </section>

    <section class="def-progress-wrap" aria-label="Progreso de guardado">
      <div class="def-progress-info">
        <span id="def-progress-text">Sin cambios pendientes.</span>
        <span id="def-visible-count">0 visibles</span>
      </div>
      <div class="def-progress-track"><div id="def-progress-bar" class="def-progress-bar"></div></div>
    </section>

    <section class="def-kpis">
      <article><span>Total</span><strong id="def-kpi-total">0</strong></article>
      <article><span>Sin requisitos</span><strong id="def-kpi-sin-req">0</strong></article>
      <article><span>Pend. Art</span><strong id="def-kpi-pend-art">0</strong></article>
      <article><span>Sup. Art</span><strong id="def-kpi-sup-art">0</strong></article>
      <article><span>Pend. Def</span><strong id="def-kpi-pend-def">0</strong></article>
      <article><span>Sup. Def</span><strong id="def-kpi-sup-def">0</strong></article>
      <article><span>Completo</span><strong id="def-kpi-completo">0</strong></article>
    </section>

    <section class="def-table-card">
      <div class="def-table-head">
        <div>
          <h2>Control de notas</h2>
          <p>La N-ART se habilita con requisitos cumplidos. La N-DEF se habilita con N-ART igual o mayor a 7.</p>
        </div>
        <span id="def-save-state">Listo</span>
      </div>
      <div id="def-table-wrap" class="def-table-wrap">
        <div class="def-empty">Cargando estudiantes...</div>
      </div>
    </section>

    <section class="def-diagnostics-card">
      <details>
        <summary>Diagnóstico</summary>
        <pre id="def-diagnostics">{}</pre>
      </details>
    </section>
  </main>

  <script src="../Gestion/Excel/excel-local/excel-local.config.js"></script>
  <script src="../Gestion/Excel/excel-local/excel-local.storage.js"></script>
  <script src="../Gestion/Excel/excel-local/excel-local.bridge.js"></script>
  <script src="../Gestion/Excel/excel-local.repo.js"></script>
  <script src="defart.core.js"></script>
  <script src="defart.export.js"></script>
  <script src="defart.app.js"></script>
</body>
</html>
