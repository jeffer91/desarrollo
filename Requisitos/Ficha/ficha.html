<!doctype html>
<!-- =========================================================
Nombre completo: ficha.html
Ruta o ubicación: /Requisitos/Ficha/ficha.html
Función o funciones:
- Mostrar la ficha individual de un estudiante cargado desde BaseLocal.
- Buscar por cédula, nombre, carrera, correo o celular.
- Mostrar datos generales, requisitos y acciones rápidas.
Con qué se conecta:
- ficha.css
- ficha.core.js
- ficha.app.js
- ../Gestion/Excel/excel-local/excel-local.config.js
- ../Gestion/Excel/excel-local/excel-local.storage.js
- ../Gestion/Excel/excel-local.repo.js
========================================================= -->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="stylesheet" href="ficha.css" />
</head>
<body>
  <main class="ficha-app">
    <section id="ficha-status" class="ficha-status">Cargando ficha...</section>

    <section class="ficha-toolbar">
      <label>Período<select id="ficha-periodo"><option value="">Todos</option></select></label>
      <label>Buscar estudiante<input id="ficha-search" type="search" placeholder="Cédula, nombre, carrera, correo o celular..." /></label>
      <button id="ficha-btn-refresh" type="button">Actualizar</button>
      <button id="ficha-btn-copy" type="button">Copiar ficha</button>
      <button id="ficha-btn-json" type="button">Exportar JSON</button>
    </section>

    <section class="ficha-layout">
      <aside class="ficha-list-card">
        <div class="ficha-list-head">
          <strong>Estudiantes</strong>
          <span id="ficha-count">0</span>
        </div>
        <div id="ficha-list" class="ficha-list"></div>
      </aside>

      <section class="ficha-detail-card">
        <div id="ficha-empty" class="ficha-empty">Selecciona un estudiante para ver la ficha.</div>
        <div id="ficha-detail" class="ficha-detail is-hidden">
          <div class="ficha-top">
            <div>
              <p class="ficha-label">Estudiante</p>
              <h2 id="ficha-nombre">—</h2>
              <p id="ficha-identidad" class="ficha-subtitle">—</p>
            </div>
            <span id="ficha-estado" class="ficha-pill ficha-pill-warn">Pendiente</span>
          </div>

          <section class="ficha-grid-info">
            <article><span>Carrera</span><strong id="ficha-carrera">—</strong></article>
            <article><span>Período</span><strong id="ficha-periodo-label">—</strong></article>
            <article><span>Sede</span><strong id="ficha-sede">—</strong></article>
            <article><span>Horario</span><strong id="ficha-horario">—</strong></article>
            <article><span>Correo</span><strong id="ficha-correo">—</strong></article>
            <article><span>Celular</span><strong id="ficha-celular">—</strong></article>
          </section>

          <section class="ficha-actions">
            <a id="ficha-whatsapp" class="ficha-action" href="#" target="_blank" rel="noopener">WhatsApp</a>
            <button id="ficha-copy-cedula" class="ficha-action" type="button">Copiar cédula</button>
            <button id="ficha-copy-correo" class="ficha-action" type="button">Copiar correo</button>
          </section>

          <section class="ficha-req-card">
            <div class="ficha-section-title">Requisitos</div>
            <div id="ficha-requisitos" class="ficha-requisitos"></div>
          </section>

          <section class="ficha-raw-card">
            <div class="ficha-section-title">Datos completos</div>
            <pre id="ficha-json"></pre>
          </section>
        </div>
      </section>
    </section>
  </main>

  <script src="../Gestion/Excel/excel-local/excel-local.config.js"></script>
  <script src="../Gestion/Excel/excel-local/excel-local.storage.js"></script>
  <script src="../Gestion/Excel/excel-local/excel-local.bridge.js"></script>
  <script src="../Gestion/Excel/excel-local.repo.js"></script>
  <script src="ficha.core.js"></script>
  <script src="ficha.export.js"></script>
  <script src="ficha.app.js"></script>
</body>
</html>
