<!DOCTYPE html>
<!-- =========================================================
Nombre completo: maq-index.html
Ruta o ubicación: /Requisitos/Maqueta/maq-index.html
Función o funciones:
- Servir como entrada interna del módulo Requisitos.
- Mostrar el menú superior fijo del bloque Requisitos.
- Cargar por defecto el HTML de Excel/Requisito.
- Mantener los módulos en iframes para no recargar desde cero al cambiar de pantalla.
Con qué se conecta:
- /Requisitos/Maqueta/maq-ui.css
- /Requisitos/Maqueta/maq-utils.js
- /Requisitos/Maqueta/maq-modulos-registry.js
- /Requisitos/Maqueta/maq-config-service.js
- /Requisitos/Maqueta/maq-core.js
- /Requisitos/Maqueta/maq-menu.js
========================================================= -->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="stylesheet" href="maq-ui.css" />
</head>
<body>
  <div class="maq-shell">
    <header class="maq-topbar">
      <div class="maq-brand" aria-label="Requisitos">
        <span class="maq-brand-badge">R</span>
        <span class="maq-brand-text">Requisitos</span>
      </div>
      <nav id="maq-main-menu" class="maq-menu" aria-label="Menú superior de Requisitos"></nav>
      <div class="maq-actions">
        <span id="maq-current-module-label" class="maq-current">Requisito</span>
        <button id="maq-btn-refresh" class="maq-btn maq-btn-primary" type="button" title="Refrescar pantalla activa">Refrescar</button>
        <a id="maq-btn-desarrollo" class="maq-btn maq-btn-light" href="../../index.html" title="Desarrollo">Desarrollo</a>
      </div>
    </header>
    <main class="maq-main">
      <section id="maq-main-frame-host" class="maq-frame-host" aria-label="Pantallas de Requisitos"></section>
    </main>
  </div>
  <script src="maq-utils.js"></script>
  <script src="maq-modulos-registry.js"></script>
  <script src="maq-config-service.js"></script>
  <script src="maq-core.js"></script>
  <script src="maq-menu.js"></script>
</body>
</html>
