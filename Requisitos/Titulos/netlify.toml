# Nombre completo: netlify.toml
# Ruta o ubicación: /Requisitos/Titulos/netlify.toml
# Función o funciones:
# - Configurar el despliegue público de Netlify.
# - Publicar únicamente las pantallas públicas compiladas en dist.
# - Definir rutas limpias para estudiante y coordinador.
# - Preparar la carpeta de funciones privadas de Netlify.
# Se conecta con:
# - package.json
# - vite.config.js
# - public/ta-titulo-articulo-estudiante.html
# - public/ta-titulo-articulo-coordinador.html
# - netlify/functions/*

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/"
  to = "/public/ta-titulo-articulo-estudiante.html"
  status = 200

[[redirects]]
  from = "/estudiante"
  to = "/public/ta-titulo-articulo-estudiante.html"
  status = 200

[[redirects]]
  from = "/coordinador"
  to = "/public/ta-titulo-articulo-coordinador.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
