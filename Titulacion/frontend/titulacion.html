<!-- =========================================================
Nombre completo: titulacion.html
Ruta: /Titulacion/frontend/titulacion.html
Función o funciones:
- Pantalla principal del módulo Titulación.
- Cargar dependencias, estilos y scripts en el orden correcto.
- Permitir importar Excel/CSV, definir período, generar informe y exportar PDF.
- Mostrar planes de generación presencial, online o PVC.
- Mostrar vista previa del documento institucional.
========================================================= -->
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Titulación - Generador de Informes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="./css/titulacion.css">
  <link rel="stylesheet" href="./css/titulacion-print.css" media="print">
</head>

<body>
  <div id="titulacion-app" class="app-shell">
    <aside class="sidebar">
      <h1>Titulación</h1>
      <p>Generador automático de informes finales del proceso de titulación.</p>

      <section class="card">
        <h2>1. Datos base</h2>

        <div class="form-group">
          <label for="periodo-input">Período</label>
          <input
            id="periodo-input"
            type="text"
            placeholder="Ejemplo: Octubre 2025 a Marzo 2026"
          >
        </div>

        <div class="form-group">
          <label for="excel-input">Importar Excel o CSV</label>
          <input id="excel-input" type="file" accept=".xlsx,.xls,.xlsm,.csv,.txt">
        </div>

        <div class="btn-row">
          <button id="btn-generar-documento" type="button">Generar</button>
          <button id="btn-limpiar-documento" type="button" class="btn-secondary">Limpiar</button>
        </div>

        <div id="document-status" class="status">Esperando datos.</div>
      </section>

      <section class="card">
        <h2>2. Documentos detectados</h2>
        <div id="plans-list">
          <div class="muted">No hay documentos generados.</div>
        </div>
      </section>

      <section class="card">
        <h2>3. Anexos</h2>

        <div
          id="titulacion-anexos-drop"
          class="drop-zone"
          data-anexo-type="evidencias"
        >
          Arrastra imágenes o PDF aquí.
        </div>

        <input
          id="titulacion-anexos-input"
          type="file"
          multiple
          accept="image/*,.pdf"
        >

        <div class="btn-row" style="margin-top:10px;">
          <button id="titulacion-anexos-refresh" type="button" class="btn-secondary">Recargar anexos</button>
          <button id="titulacion-anexos-clear" type="button" class="btn-secondary">Limpiar anexos</button>
        </div>

        <div id="titulacion-anexos-status" class="status"></div>
        <div id="titulacion-anexos-list"></div>
      </section>

      <section class="card">
        <h2>4. Exportación</h2>
        <button id="btn-exportar" type="button">Exportar PDF</button>
        <button
          id="btn-vista-print"
          type="button"
          class="btn-secondary"
          onclick="window.open('./titulacion-print.html','_blank')"
        >
          Vista imprimible
        </button>
      </section>
    </aside>

    <main class="main">
      <div id="titulacion-documento" class="document-empty">
        Todavía no se ha generado un documento.
      </div>
    </main>
  </div>

  <!-- Librerías externas -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfmake/build/pdfmake.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfmake/build/vfs_fonts.js"></script>

  <!-- Supabase -->
  <script src="../basedatos/supabase/supabase.config.js"></script>
  <script src="../basedatos/supabase/supabase.client.js"></script>
  <script src="../basedatos/supabase/supabase.storage.js"></script>
  <script src="../basedatos/supabase/supabase.anexos.js"></script>

  <!-- Core base -->
  <script src="./js/core/titulacion-config.js"></script>
  <script src="./js/core/titulacion-env.js"></script>
  <script src="./js/core/titulacion-utils.js"></script>
  <script src="./js/core/titulacion-validaciones.js"></script>
  <script src="./js/core/titulacion-bus.js"></script>

  <!-- Repositorio -->
  <script src="./js/repositorio/titulacion-local-repo.js"></script>

  <!-- Brain -->
  <script src="./js/brain/titulacion-brain-periodo.js"></script>
  <script src="./js/brain/titulacion-brain-modalidad.js"></script>
  <script src="./js/brain/titulacion-brain-cohorte.js"></script>
  <script src="./js/brain/titulacion-brain-carreras.js"></script>
  <script src="./js/brain/titulacion-brain-resultados.js"></script>
  <script src="./js/brain/titulacion-brain-conclusiones.js"></script>
  <script src="./js/brain/titulacion-brain-recomendaciones.js"></script>

  <!-- Clasificación -->
  <script src="./js/clasificacion/titulacion-periodo-modalidad.js"></script>

  <!-- Documentos -->
  <script src="./js/documentos/titulacion-document-code.js"></script>
  <script src="./js/documentos/titulacion-filenames.js"></script>
  <script src="./js/documentos/titulacion-portada.js"></script>
  <script src="./js/documentos/titulacion-indice.js"></script>
  <script src="./js/documentos/titulacion-anexos.js"></script>
  <script src="./js/documentos/titulacion-anexos-ui.js"></script>
  <script src="./js/documentos/titulacion-resumen-tecnico.js"></script>

  <!-- Capítulos -->
  <script src="./js/capitulos/titulacion-capitulo-marco-legal.js"></script>
  <script src="./js/capitulos/titulacion-capitulo-reglamento-complexivo.js"></script>
  <script src="./js/capitulos/titulacion-capitulo-infografia.js"></script>
  <script src="./js/capitulos/titulacion-capitulo-metodologia-nucleos.js"></script>
  <script src="./js/capitulos/titulacion-capitulo-contenido-nucleos.js"></script>
  <script src="./js/capitulos/titulacion-capitulo-resultados.js"></script>
  <script src="./js/capitulos/titulacion-capitulo-informe-cohorte.js"></script>
  <script src="./js/capitulos/titulacion-capitulo-analisis-comparativo.js"></script>
  <script src="./js/capitulos/titulacion-capitulo-analisis-estrategico.js"></script>
  <script src="./js/capitulos/titulacion-capitulo-conclusiones.js"></script>
  <script src="./js/capitulos/titulacion-capitulo-recomendaciones.js"></script>

  <!-- PVC -->
  <script src="./js/pvc/titulacion-pvc-aspectos-generales.js"></script>
  <script src="./js/pvc/titulacion-pvc-marco-normativo.js"></script>
  <script src="./js/pvc/titulacion-pvc-articulo-academico.js"></script>
  <script src="./js/pvc/titulacion-pvc-resultados.js"></script>
  <script src="./js/pvc/titulacion-pvc-conclusiones.js"></script>

  <!-- Importación y gráficos -->
  <script src="./js/graficos/titulacion-graficos.js"></script>
  <script src="./js/importacion/titulacion-import-excel.js"></script>

  <!-- Exportación PDF modular -->
  <script src="./js/exportacion/pdf-export/titulacion-pdf-export-utils.js"></script>
  <script src="./js/exportacion/pdf-export/titulacion-pdf-export-assets.js"></script>
  <script src="./js/exportacion/pdf-export/titulacion-pdf-export-layout.js"></script>
  <script src="./js/exportacion/pdf-export/titulacion-pdf-export-headings.js"></script>
  <script src="./js/exportacion/pdf-export/titulacion-pdf-export-tables.js"></script>
  <script src="./js/exportacion/pdf-export/titulacion-pdf-export-anexos.js"></script>
  <script src="./js/exportacion/pdf-export/titulacion-pdf-export-resultados.js"></script>
  <script src="./js/exportacion/pdf-export/titulacion-pdf-export-builder.js"></script>
  <script src="./js/exportacion/pdf-export/titulacion-pdf-export-actions.js"></script>
  <script src="./js/exportacion/titulacion-export-pdf.js"></script>

  <!-- Arranque -->
  <script src="./js/core/titulacion-core.js"></script>
  <script src="./js/core/titulacion-orquestador.js"></script>
</body>
</html>
